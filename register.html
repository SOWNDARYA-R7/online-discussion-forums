<!DOCTYPE html>
<html lang="en">
<head>
  
    <title>Registration</title>
</head>
<body>
    <div>
        <table>
            <form>
                <tr>
                    <td>
                        <lable>
                            Username
                        </lable>
                    </td>
                    
                    <td>
                        <input type="text" placeholder="eg: johndoe"/>    
                    </td>
                </tr>
                <tr>
                    <td>
                        <lable>
                            Email
                        </lable>
                    </td>
                    <td>
                        <input type="email" placeholder="eg: johndoe@gmail.com">
                    </td>
                </tr>
                <tr>
                    <td>
                        <lable>
                            Password
                        </lable>
                    </td>
                    <td>
                        <input type="password" placeholder="must contains 6 characters">
                    </td>
                </tr>
            </form>
        </table>
        <br><br>

        <div>
            <button type="submit" > Register</button>
        </div>
    </div>
</body>
</html>
