<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism Example</title>
  <style>
    body {
      background: url("https://wallpaperaccess.com/full/233596.jpg") no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .glass {
      width: 300px;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.1); /* transparent white */
      backdrop-filter: blur(10px);          /* blur effect */
      -webkit-backdrop-filter: blur(10px);  /* Safari support */
      border: 1px solid rgba(255, 255, 255, 0.3); /* subtle border */
      color: white;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="glass">
    <h2>Glassmorphism Division</h2>
    <p>This is a frosted glass effect.</p>
  </div>
</body>
</html>
